name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: void-lab-release
        path: app/build/outputs/apk/release/app-release.apk
```

### **Option B: Download the JAR Manually**

Download from here and upload to your repo at `gradle/wrapper/gradle-wrapper.jar`:
https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar

---

## 🚀 **DEPLOYMENT STEPS**

1. **Replace `.github/workflows/android.yml`** with the corrected version above
2. **Add `gradlew`** file (mark as executable in git - GitHub does this automatically for shell scripts)
3. **Add `gradlew.bat`** file
4. **Commit and push**

The workflow will now:
1. Generate the Gradle wrapper JAR automatically
2. Build your APK
3. Upload it using the new v4 artifact action

